<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Бирки — Пильный центр</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">
      <svg class="logo" viewBox="0 0 32 32" fill="none" stroke="#7cb342" stroke-width="2"
           stroke-linejoin="round" stroke-linecap="round" aria-hidden="true">
        <path d="M16 3 L28 9 V23 L16 29 L4 23 V9 Z"/>
        <path d="M4 9 L16 15 L28 9"/>
        <path d="M16 15 V29"/>
      </svg>
      <div class="brand-text">
        <h1>PackSmart</h1>
        <p>Бирки для пильного центра</p>
      </div>
    </div>
  </header>

  <main>
    <div class="panel">
      <p class="hint">Выбери дату задания и нажми «Сформировать бирки» — данные подтянутся из таблицы автоматически.</p>
      <div class="row">
        <label for="dateSelect">Дата задания</label>
        <select id="dateSelect"><option>загрузка…</option></select>
      </div>
      <div class="row buttons">
        <button id="genBtn" class="primary" disabled>Сформировать бирки</button>
        <button id="printBtn" disabled>🖨 Печать всех</button>
        <button id="pdfBtn" disabled>📄 Скачать всё (PDF)</button>
        <button id="zipBtn" disabled>⬇ Скачать всё (EMF, ZIP)</button>
      </div>
      <div id="status" class="status">Запуск…</div>
    </div>

    <div class="searchbar" id="searchbar" hidden>
      <i aria-hidden="true">🔎</i>
      <input id="search" type="search" placeholder="Поиск по названию, месту или материалу…" autocomplete="off">
      <span id="count" class="count"></span>
    </div>

    <div id="grid" class="grid"></div>
  </main>

  <footer>
    Бирки печатаются на пильном центре. Данные тянутся из общей таблицы —
    поменял «Место» в таблице, перегенерировал здесь, и на бирке новая ячейка.
  </footer>

  <script src="vendor/qrcode.min.js"></script>
  <script src="vendor/jszip.min.js"></script>
  <script src="vendor/jspdf.umd.min.js"></script>
  <script src="icon.js"></script>
  <script src="config.js"></script>
  <script src="label.js"></script>
  <script src="export.js"></script>
  <script src="app.js"></script>
</body>
</html>
