name: Синхронизация бирок в Drive

on:
  schedule:
    - cron: "*/5 * * * *"       # каждые 5 минут
  workflow_dispatch:            # ручной запуск
    inputs:
      days:
        description: "За сколько дней брать XML (пусто = 7; для полного прогона по всей истории: 3650)"
        required: false
        default: ""

concurrency:
  group: sync-drive
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Шрифты Arial (как на бирках)
        run: |
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get update -qq
          sudo apt-get install -y -qq ttf-mscorefonts-installer fontconfig || true

      - name: Зависимости
        run: pip install --quiet pillow segno google-api-python-client google-auth google-auth-httplib2

      - name: Синхронизация
        env:
          RASPIL_SHEET_ID: "10nsX_nmzfPB7IyHM7oSqlj8wrdBn-zfoaKiMDZSccKI"
          SYNC_DAYS: ${{ github.event.inputs.days }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python3 sync_drive.py
